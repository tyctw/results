name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://dshylhiirwsihuzfihvp.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzaHlsaGlpcndzaWh1emZpaHZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTg4NjUsImV4cCI6MjA5ODQ5NDg2NX0.5E-fGI9_zkdLATgVy_Now07rmrjTnjr4Yj3Ggw_03fA' }}

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Add nojekyll marker
        run: touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
